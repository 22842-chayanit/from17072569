<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มเก็บข้อมูลนักเรียน</title>
    <!-- Google Fonts for Modern Thai Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #6c5ce7;
            --light-purple: #a29bfe;
            --bg-purple: #f8f7ff;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --white: #ffffff;
            --border-color: #dfe6e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-purple);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .form-container {
            background-color: var(--white);
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.1);
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header h1 {
            color: var(--primary-purple);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 15px;
        }

        fieldset {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            background-color: var(--white);
        }

        legend {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-purple);
            padding: 0 15px;
            margin-left: 10px;
        }

        /* Responsive Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }

        .col-2 { grid-column: span 2; }
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-8 { grid-column: span 8; }
        .col-10 { grid-column: span 10; }
        .col-12 { grid-column: span 12; }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        /* Input Styles */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
            background-color: var(--white);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Inline Custom Styling for Specific Inputs */
        .radio-group, .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding-top: 8px;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="radio"], input[type="checkbox"] {
            accent-color: var(--primary-purple);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        input[type="color"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 50px;
            height: 40px;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }

        input[type="color"]::-webkit-color-swatch {
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        input[type="file"] {
            font-size: 14px;
            color: var(--text-light);
        }

        input[type="file"]::file-selector-button {
            background-color: var(--light-purple);
            color: var(--white);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 15px;
            transition: background 0.2s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: var(--primary-purple);
        }

        /* Agreement Section */
        .agreement-section {
            margin: 20px 0 30px 0;
            display: flex;
            justify-content: center;
        }

        /* Buttons Section */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background-color: var(--primary-purple);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-submit:hover {
            background-color: #5b4bc4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }

        .btn-reset {
            background-color: #eee;
            color: var(--text-light);
        }

        .btn-reset:hover {
            background-color: #dfe6e9;
            color: var(--text-dark);
            transform: translateY(-2px);
        }

        /* Responsive Design for Tablets and Phones */
        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
            }
            .form-container {
                padding: 20px;
            }
            .col-2, .col-3, .col-4, .col-6, .col-8, .col-10, .col-12 {
                grid-column: span 12;
            }
            .radio-group, .checkbox-group {
                flex-direction: column;
                gap: 10px;
            }
            .button-group {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h1>ระบบลงทะเบียนข้อมูลนักเรียน</h1>
            <p>กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้องตามความเป็นจริง</p>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <!-- 1. ข้อมูลส่วนตัว -->
            <fieldset>
                <legend>1. ข้อมูลส่วนตัว</legend>
                <div class="form-grid">
                    <div class="form-group col-3">
                        <label for="title">คำนำหน้า *</label>
                        <select id="title" name="title" required>
                            <option value="" disabled selected>เลือก...</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                        </select>
                    </div>
                    <div class="form-group col-6">
                        <label for="fullname">ชื่อ-นามสกุล *</label>
                        <input type="text" id="fullname" name="fullname" placeholder="สมชาย ใจดี" required>
                    </div>
                    <div class="form-group col-3">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="บอย">
                    </div>
                    <div class="form-group col-4">
                        <label for="student_id">เลขประจำตัวนักเรียน *</label>
                        <input type="text" id="student_id" name="student_id" pattern="[0-9]{5,}" placeholder="ระบุเลข 5 หลักขึ้นไป" required>
                    </div>
                    <div class="form-group col-5">
                        <label for="birthdate">วันเดือนปีเกิด *</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                    <div class="form-group col-3">
                        <label for="age">อายุ (ปี) *</label>
                        <input type="number" id="age" name="age" min="1" max="100" required>
                    </div>
                </div>
            </fieldset>

            <!-- 2. ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>2. ข้อมูลการติดต่อ</legend>
                <div class="form-grid">
                    <div class="form-group col-6">
                        <label for="email">อีเมล *</label>
                        <input type="email" id="email" name="email" placeholder="example@school.ac.th" required>
                    </div>
                    <div class="form-group col-6">
                        <label for="phone">เบอร์โทรศัพท์ *</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{9,10}" placeholder="เช่น 0812345678" required>
                    </div>
                    <div class="form-group col-12">
                        <label for="address">ที่อยู่ปัจจุบัน *</label>
                        <textarea id="address" name="address" placeholder="บ้านเลขที่, ถนน, ตำบล, อำเภอ..." required></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- 3. ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>3. ข้อมูลส่วนบุคคล</legend>
                <div class="form-grid">
                    <div class="form-group col-6">
                        <label>เพศ *</label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="gender" value="ชาย" required> ชาย
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="gender" value="หญิง"> หญิง
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="gender" value="อื่นๆ"> อื่นๆ / ไม่ระบุ
                            </label>
                        </div>
                    </div>
                    <div class="form-group col-6">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion">
                            <option value="" disabled selected>เลือกศาสนา...</option>
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="ฮินดู">พราหมณ์-ฮินดู</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                    <div class="form-group col-6">
                        <label for="province">จังหวัด *</label>
                        <input type="text" id="province" name="province" placeholder="เช่น กรุงเทพมหานคร" required>
                    </div>
                    <div class="form-group col-6">
                        <label for="blood_type">กรุ๊ปเลือด</label>
                        <select id="blood_type" name="blood_type">
                            <option value="" disabled selected>เลือกกรุ๊ปเลือด...</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="O">O</option>
                            <option value="AB">AB</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- 4. ความสนใจ -->
            <fieldset>
                <legend>4. ความสนใจ</legend>
                <div class="form-grid">
                    <div class="form-group col-12">
                        <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="อ่านหนังสือ"> อ่านหนังสือ</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="เล่นกีฬา"> เล่นกีฬา / ออกกำลังกาย</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="เล่นเกม"> เล่นเกม</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="ดูหนังฟังเพลง"> ดูหนัง / ฟังเพลง</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="วาดภาพ"> วาดภาพ / ทำงานศิลปะ</label>
                        </div>
                    </div>
                    <div class="form-group col-4">
                        <label for="fav_color">สีที่ชอบ</label>
                        <input type="color" id="fav_color" name="fav_color" value="#6c5ce7">
                    </div>
                    <div class="form-group col-8">
                        <label for="fav_website">เว็บไซต์ที่ชอบ (URL)</label>
                        <input type="url" id="fav_website" name="fav_website" placeholder="https://example.com">
                    </div>
                </div>
            </fieldset>

            <!-- 5. ข้อมูลการศึกษา -->
            <fieldset>
                <legend>5. ข้อมูลการศึกษา</legend>
                <div class="form-grid">
                    <div class="form-group col-3">
                        <label for="education_level">ระดับชั้น *</label>
                        <select id="education_level" name="education_level" required>
                            <option value="" disabled selected>เลือกชั้น...</option>
                            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                            <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                            <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                            <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group col-3">
                        <label for="classroom">ห้องเรียน *</label>
                        <input type="number" id="classroom" name="classroom" min="1" max="20" placeholder="เช่น 1" required>
                    </div>
                    <div class="form-group col-3">
                        <label for="program">แผนการเรียน</label>
                        <input type="text" id="program" name="program" placeholder="เช่น วิทย์-คณิต">
                    </div>
                    <div class="form-group col-3">
                        <label for="gpa">เกรดเฉลี่ยสะสม (GPAX) *</label>
                        <input type="number" id="gpa" name="gpa" min="0.00" max="4.00" step="0.01" placeholder="0.00 - 4.00" required>
                    </div>
                </div>
            </fieldset>

            <!-- 6. การอัปโหลดไฟล์ -->
            <fieldset>
                <legend>6. การอัปโหลดไฟล์</legend>
                <div class="form-grid">
                    <div class="form-group col-6">
                        <label for="profile_pic">รูปภาพประจำตัว (JPG, PNG) *</label>
                        <input type="file" id="profile_pic" name="profile_pic" accept="image/*" required>
                    </div>
                    <div class="form-group col-6">
                        <label for="documents">เอกสารเพิ่มเติม (PDF)</label>
                        <input type="file" id="documents" name="documents" accept=".pdf">
                    </div>
                </div>
            </fieldset>

            <!-- 7. ความคิดเห็นเพิ่มเติม -->
            <fieldset>
                <legend>7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-grid">
                    <div class="form-group col-12">
                        <label for="comments">แสดงความคิดเห็น / ข้อมูลเพิ่มเติมเพิ่มเติม</label>
                        <textarea id="comments" name="comments" placeholder="ข้อความหรือหมายเหตุเพิ่มเติมของคุณ..."></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- 8. ยืนยันข้อมูล -->
            <div class="agreement-section">
                <label class="checkbox-item">
                    <input type="checkbox" name="agreement" required> ข้าพเจ้ายินยอมและยอมรับเงื่อนไขการใช้งานและการเก็บรักษาข้อมูลนี้ *
                </label>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-submit">ส่งข้อมูล</button>
                <button type="reset" class="btn btn-reset">ล้างข้อมูล</button>
            </div>

        </form>
    </div>

</body>
</html>
